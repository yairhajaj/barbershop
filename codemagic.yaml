workflows:

  # ── Android Release ──────────────────────────────────────────────
  android-release:
    name: Android Release (AAB)
    max_build_duration: 60
    environment:
      node: 22
      java: 21
      groups:
        - android_signing   # CM_KEYSTORE, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Add & sync Android platform
        script: |
          npx cap add android 2>/dev/null || true
          npx cap sync android
          mkdir -p android/app/src/main/assets
          echo "registration_token=CHIIIGMBS2YF6AAAAAAAAAAAAA" > android/app/src/main/assets/adi-registration.properties

      - name: Set up Android signing
        script: |
          echo $CM_KEYSTORE | base64 --decode > android/hajaj-release.keystore
          cat > android/keystore.properties << EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=hajaj-release.keystore
          EOF

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

    # publishing:  ← הפעל אחרי שמגדירים Google Play service account
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal

  # ── iOS Release ──────────────────────────────────────────────────
  ios-release:
    name: iOS Release (IPA)
    max_build_duration: 90
    environment:
      node: 22
      xcode: latest
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.hajaj.app
        APP_STORE_APP_ID: "6762282148"
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set up code signing
        script: |
          set -e
          echo "=== DEBUG: checking env vars ==="
          echo "Key ID length: ${#APP_STORE_CONNECT_KEY_IDENTIFIER}"
          echo "Issuer ID length: ${#APP_STORE_CONNECT_ISSUER_ID}"
          echo "Private key length: ${#APP_STORE_CONNECT_PRIVATE_KEY}"
          echo "Key ID value: $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Issuer ID value: $APP_STORE_CONNECT_ISSUER_ID"
          echo "================================"
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
